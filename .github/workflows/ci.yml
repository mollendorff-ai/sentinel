name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check --select ALL .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: >-
          pytest
          -m "not integration"
          --cov=src/sentinel
          --cov-fail-under=100
          -q

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    outputs:
      percentage: ${{ steps.metrics.outputs.percentage }}
      tests: ${{ steps.metrics.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run tests and extract metrics
        id: metrics
        run: |
          OUTPUT=$(pytest -m "not integration" --cov=src/sentinel --cov-fail-under=100 -q 2>&1)
          echo "$OUTPUT"

          COVERAGE=$(echo "$OUTPUT" | grep '^TOTAL' | awk '{print $NF}')
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVERAGE"

          TESTS=$(echo "$OUTPUT" | grep -oP '\d+ passed' | awk '{print $1}')
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"
          echo "Tests: $TESTS passed"

  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx markdownlint-cli2 '**/*.md'

  badges:
    name: Update badges
    runs-on: ubuntu-latest
    needs: [lint, test, coverage, markdown]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: sentinel-coverage.json
          label: coverage
          message: ${{ needs.coverage.outputs.percentage }}
          valColorRange: ${{ needs.coverage.outputs.percentage }}
          minColorRange: 50
          maxColorRange: 100

      - name: Update test count badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: sentinel-tests.json
          label: tests
          message: "${{ needs.coverage.outputs.tests }} passing"
          color: brightgreen
