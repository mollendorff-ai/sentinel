  type: python

description: >
  Multi-agent earnings analysis. LangGraph agents fetch live data via ref,
  build financial models via forge, run simulations, and produce
  investment-grade briefs with zero hallucinated numbers.

stack:
  - python
  - langgraph
  - langchain
  - langsmith
