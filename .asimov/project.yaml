identity:
  name: "sentinel"
  type: python

description: >
  Multi-agent earnings analysis. LangGraph agents fetch live data via ref,
  build financial models via forge, run simulations, and produce
  investment-grade briefs with zero hallucinated numbers.

stack:
  - python
  - langgraph
  - langchain
  - langsmith
  - forge
  - ref

conventions:
  - "LangGraph for agent orchestration, LangChain for components only"
  - "Forge via MCP (langchain-mcp-adapters, stdio transport) for financial calculations — no in-agent math"
  - "Forge CLI subprocess only for tools not in MCP (simulate, tornado) — v0.3.0+"
  - "Ref via MCP (langchain-mcp-adapters, stdio transport) for all web retrieval (never WebSearch/WebFetch)"
  - "LangSmith tracing enabled from day one"
  - "Sibling repos for reference: ../forge/ (YAML schema, MCP tool defs, examples), ../ref/ (CLI usage)"
