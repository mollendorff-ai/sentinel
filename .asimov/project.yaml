  - ref

conventions:
  - "LangGraph for agent orchestration, LangChain for components only"
  - "forge CLI for all financial calculations (no in-agent math)"
  - "ref fetch for all web retrieval (never WebSearch/WebFetch)"
  - "LangSmith tracing enabled from day one"
