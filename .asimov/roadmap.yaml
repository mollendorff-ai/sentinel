  - "Streaming: real-time agent progress to terminal (LangGraph streaming API)"
  - "RAG layer: historical earnings for trend comparison (Qdrant or ChromaDB)"
  - "Comparative analysis: multiple companies in same sector"
  - "PDF report generation (WeasyPrint or similar)"
  - "MCP server wrapper: expose Sentinel as MCP tool for Claude Code"
  - "Docker containerization for reproducible demos"
