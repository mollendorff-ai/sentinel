    date: "2026-02-22"
    summary: "Persistence + observability + developer experience"
    deliverables:
      - "[x] Makefile: setup, test, lint, demo, demo-quick, clean, help targets"
      - "[x] SQLite checkpointer (replace MemorySaver) -- resume interrupted runs"
      - "[x] LangSmith traces with meaningful run names and metadata tags"
      - "[x] Structured output dir: JSON + markdown brief + Forge YAML model per ticker"
      - "[x] Multi-ticker batch mode: python -m sentinel AAPL MSFT GOOG"
      - "[x] Error handling: graceful failure if ref fetch or forge tools error"
      - "[x] ADR-007: SQLite Checkpointer over MemorySaver"
      - "[x] ADR-008: Structured Output Directory"
      - "[x] 126 unit tests at 100% coverage"

  - version: "0.3.0"
    date: "2026-02-22"
    summary: "Risk + scenarios -- full 5-agent pipeline with conditional routing"
    deliverables:
      - "[x] Risk Analyst agent: forge_simulate (Monte Carlo) + forge_tornado + forge_break_even"
      - "[x] Scenario Planner agent: forge_scenarios (bull/base/bear) + forge_compare + forge_break_even"
      - "[x] LangGraph graph: Research -> Modeler -> Risk Analyst -> Scenario Planner -> Synthesizer"
      - "[x] Conditional routing: --quick flag skips Risk + Scenario nodes"
      - "[x] Synthesizer enhanced: risk profile + scenario comparison sections"
      - "[x] Default LLM switched to Opus 4.6 (claude-opus-4-6)"
      - "[x] ADR-006: Five-Agent Pipeline with Conditional Routing"
      - "[x] 77 unit tests at 100% coverage"

  - version: "0.2.2"
    date: "2026-02-22"
    summary: "Forge MCP tool list updated from 10 to 20; no more CLI subprocess fallback"
    deliverables:
      - "[x] FORGE_TOOL_NAMES expanded: 7 analysis engines + 3 discovery tools (20 total)"
      - "[x] Modeler agent updated for Forge structured JSON responses (tables_valid/scalars_valid, scalars dict)"
      - "[x] ADR-002 updated: CLI subprocess fallback removed — all Forge tools now via MCP"
      - "[x] v0.3.0 roadmap updated: Risk Analyst + Scenario Planner use forge_simulate/forge_tornado/forge_scenarios via MCP"

  - version: "0.2.1"
    date: "2026-02-22"
    summary: "Ref MCP migration -- subprocess wrapper replaced with native MCP client"
    deliverables:
      - "[x] Ref MCP client via langchain-mcp-adapters (stdio transport: ref mcp)"
      - "[x] Research agent batch fetching via MCP connection"
      - "[x] ADR-005: Ref MCP over CLI subprocess for web data ingestion"
      - "[x] Removed sentinel.tools.ref_fetch CLI subprocess wrapper"

  - version: "0.2.0"
    date: "2026-02-22"
    summary: "Core 3-agent flow -- one ticker in, one brief out"
    deliverables:
      - "[x] LangGraph state schema (TypedDict: ticker, raw_data, model_yaml, forge_results, brief)"
      - "[x] Research agent: ref fetch earnings release -> Claude extracts revenue, margins, guidance"
      - "[x] Modeler agent: Claude writes Forge YAML from extracted data -> forge_validate -> forge_calculate"
      - "[x] Self-correction loop: if forge_validate returns errors, Modeler retries with error context"
      - "[x] Synthesizer agent: reads Forge calculation results -> produces executive brief with valuation"
