      - "[x] CLI entry point: python -m sentinel AAPL"
      - "[x] GitHub Actions CI: lint + test matrix (3.11/3.12) + markdownlint"
      - "[x] Integration test markers: 7 smoke tests separated, 4 mocked equivalents for CI coverage"
      - "[x] Multi-provider LLM: get_llm() factory, env-var config (anthropic/openai/google/groq)"
      - "[x] ADR-003: Custom StateGraph over deprecated create_react_agent"
      - "[x] ADR-004: Multi-provider LLM support via env-var factory"
      - "[x] README: badges (CI, coverage, Python, license) + status section"
      - "[x] 51 unit tests at 100% coverage"

  - version: "0.1.0"
    date: "2026-02-22"
    summary: "Project scaffold + Forge MCP + Ref tool"
    deliverables:
      - "[x] pyproject.toml: langgraph, langchain-anthropic, langchain-mcp-adapters, langsmith"
      - "[x] Python venv + editable install (uv or pip)"
      - "[x] LangSmith tracing wired (.env.example with LANGSMITH_API_KEY, project name)"
      - "[x] ADR-001: Python over TypeScript"
      - "[x] ADR-002: Forge MCP over CLI subprocess for core tools"
      - "[x] Forge MCP client via langchain-mcp-adapters (stdio transport: forge mcp)"
      - "[x] All 10 Forge tools discovered and verified"
      - "[x] Smoke tests: forge_validate + forge_calculate on sample YAML"
      - "[x] Ref CLI wrapper as LangChain tool (subprocess: ref fetch URL -> structured JSON)"
      - "[x] Smoke tests: ref fetch structured JSON + error handling"

